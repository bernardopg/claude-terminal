<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; style-src 'self' 'unsafe-inline'; navigate-to 'none'">
  <title>Notification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #161616;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    .notification {
      position: relative;
      background: #161616;
      display: flex;
      gap: 12px;
      padding: 14px;
      overflow: hidden;
      height: 100vh;
    }

    .notif-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      color: var(--accent, #d97706);
    }
    .notif-icon svg { width: 17px; height: 17px; }

    .notif-content {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .notif-title {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 20px;
    }

    .notif-body {
      font-size: 11.5px;
      color: #707070;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .notif-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, filter 0.15s;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: var(--accent, #d97706);
      color: #0a0a0a;
    }
    .btn-primary:hover { filter: brightness(1.1); }

    .btn-secondary {
      background: #252525;
      color: #999;
      border: 1px solid #2f2f2f;
    }
    .btn-secondary:hover { background: #2f2f2f; color: #bbb; }

    .btn-danger {
      background: transparent;
      color: #ef4444;
      border: 1px solid #3d1515;
    }
    .btn-danger:hover { background: #1f0a0a; }

    .btn-ghost {
      background: transparent;
      color: #666;
      border: 1px solid transparent;
      font-weight: 500;
    }
    .btn-ghost:hover { color: #999; border-color: #2f2f2f; }

    .notif-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #333;
      cursor: pointer;
      border-radius: 3px;
      font-size: 13px;
      z-index: 2;
      transition: color 0.15s;
      opacity: 0;
    }
    .notification:hover .notif-close { opacity: 1; }
    .notif-close:hover { color: #999; }

    .notif-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: #1a1a1a;
      overflow: hidden;
      border-radius: 0 0 8px 8px;
    }

    .notif-progress-bar {
      height: 100%;
      background: var(--accent, #d97706);
      opacity: 0.5;
      animation: progress-shrink var(--dismiss-time, 8000ms) linear forwards;
    }

    @keyframes progress-shrink {
      from { width: 100%; }
      to { width: 0%; }
    }
  </style>
</head>
<body>
  <div class="notification" id="notification">
    <div class="notif-icon" id="notif-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="notif-content">
      <div class="notif-title" id="title"></div>
      <div class="notif-body" id="body"></div>
      <div class="notif-actions" id="notif-actions"></div>
    </div>
    <button class="notif-close" id="closeBtn">&times;</button>
  </div>

  <script>
    // notifAPI est exposé par preload-notification.js via contextBridge

    const params = new URLSearchParams(window.location.search);
    const data = JSON.parse(decodeURIComponent(params.get('data')));
    const { title, body, terminalId, notifId, autoDismiss, buttons, meta } = data;

    // Load accent color
    const accentColor = notifAPI.readSettingsAccentColor();
    if (accentColor) {
      document.documentElement.style.setProperty('--accent', accentColor);
    }

    // Fill content
    document.getElementById('title').textContent = title;
    document.getElementById('body').textContent = body;

    // Set icon based on notification type (passed via meta.type or inferred from buttons)
    const notifType = (meta && meta.notifType) || 'done';
    const iconEl = document.getElementById('notif-icon');
    if (notifType === 'question') {
      iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
    } else if (notifType === 'permission') {
      iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
      iconEl.style.color = '#f59e0b';
    } else if (notifType === 'plan') {
      iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>';
    } else if (notifType === 'info') {
      iconEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
      iconEl.style.color = '#3b82f6';
    }

    // Render buttons
    var actionsDiv = document.getElementById('notif-actions');
    var btnList = (buttons && buttons.length > 0)
      ? buttons
      : [{ label: 'Show', action: 'show', style: 'primary' }];

    btnList.forEach(function(btn) {
      var el = document.createElement('button');
      el.className = 'btn btn-' + (btn.style || 'primary');
      el.textContent = btn.label;
      el.addEventListener('click', function() {
        notifAPI.send('notification-action', {
          action: btn.action,
          terminalId: terminalId,
          value: btn.value || null,
          requestId: (meta && meta.requestId) || null
        });
        dismiss();
      });
      actionsDiv.appendChild(el);
    });

    // Close button
    document.getElementById('closeBtn').addEventListener('click', function() { dismiss(); });

    // Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') dismiss();
    });

    // Auto-dismiss with progress bar (autoDismiss: 0 = no auto-dismiss)
    var autoDismissTimer = null;
    if (autoDismiss && autoDismiss > 0) {
      var notifEl = document.getElementById('notification');
      var progressEl = document.createElement('div');
      progressEl.className = 'notif-progress';
      progressEl.innerHTML = '<div class="notif-progress-bar" style="--dismiss-time: ' + autoDismiss + 'ms"></div>';
      notifEl.appendChild(progressEl);
      autoDismissTimer = setTimeout(function() { dismiss(); }, autoDismiss);
    }

    // Dismiss
    var dismissed = false;
    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      if (autoDismissTimer) clearTimeout(autoDismissTimer);
      notifAPI.send('notification-dismiss', { notifId: notifId });
    }
  </script>
</body>
</html>
