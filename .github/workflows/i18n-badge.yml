---
# i18n-badge.yml — Dynamic i18n coverage badges for Claude Terminal
#
# Triggers:
#   - On push when any locale file changes
#   - Manually via workflow_dispatch
#
# What it does:
#   1. Runs scripts/check-i18n.js --json to get coverage data
#   2. For each non-English locale, updates a Shields.io endpoint stored in a
#      GitHub Gist using schneegans/dynamic-badges-action.
#
# Required secrets (set in repository Settings → Secrets → Actions):
#   GIST_SECRET  — Personal Access Token with 'gist' scope
#   GIST_ID      — ID of a public Gist (create one empty at gist.github.com)
#
# Badge URL pattern (add to README):
#   https://img.shields.io/endpoint?url=https://gist.githubusercontent.com/<USER>/<GIST_ID>/raw/i18n_<lang>.json
#
# Color thresholds (defined in scripts/check-i18n.js):
#   brightgreen  ≥ 90 %
#   yellow       ≥ 60 %
#   red          < 60 %

name: i18n Coverage Badges

on:
  push:
    paths:
      - 'src/renderer/i18n/locales/**'
  workflow_dispatch:

jobs:
  update-badges:
    name: Update i18n badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Run the coverage checker and capture JSON output
      - name: Compute i18n coverage
        id: coverage
        run: |
          # Allow the script to exit with code 1 (below-threshold) without
          # failing the workflow — we still want to update the badges.
          set +e
          OUTPUT=$(node scripts/check-i18n.js --json)
          EXIT_CODE=$?
          set -e

          # Write JSON to a temp file so subsequent steps can read it
          echo "$OUTPUT" > /tmp/i18n-coverage.json
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "--- i18n coverage JSON ---"
          cat /tmp/i18n-coverage.json

      # Read the JSON and export per-locale badge data as step outputs
      - name: Parse coverage data
        id: parse
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/i18n-coverage.json', 'utf8'));
          const out = process.env.GITHUB_OUTPUT;

          for (const locale of data.locales) {
            const lang = locale.locale;
            const message = `${locale.percentage}%`;
            const color = locale.color;
            const label = `i18n ${lang}`;

            // Write outputs for the badge action
            fs.appendFileSync(out, `label_${lang}=${label}\n`);
            fs.appendFileSync(out, `message_${lang}=${message}\n`);
            fs.appendFileSync(out, `color_${lang}=${color}\n`);
            fs.appendFileSync(out, `file_${lang}=i18n_${lang}.json\n`);

            console.log(`→ ${lang}: ${message} (${color})`);
          }
          EOF

      # ── French (fr) ─────────────────────────────────────────────────────────
      # Add one block per locale. Copy-paste and adjust the `lang` variable.

      - name: Update badge — French (fr)
        if: steps.parse.outputs.message_fr != ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: i18n_fr.json
          label: "🌐 French (fr)"
          message: ${{ steps.parse.outputs.message_fr }}
          color: ${{ steps.parse.outputs.color_fr }}

      # ── Spanish (es) ────────────────────────────────────────────────────────

      - name: Update badge — Spanish (es)
        if: steps.parse.outputs.message_es != ''
        uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: i18n_es.json
          label: "🌐 Spanish (es)"
          message: ${{ steps.parse.outputs.message_es }}
          color: ${{ steps.parse.outputs.color_es }}

      # ── Template for future locales ──────────────────────────────────────────
      # To add a new locale (e.g., German 'de'), copy the block above and set:
      #   filename:  i18n_de.json
      #   label:     "🌐 German (de)"
      #   message:   ${{ steps.parse.outputs.message_de }}
      #   color:     ${{ steps.parse.outputs.color_de }}

      - name: Warn on low coverage threshold
        if: ${{ steps.coverage.outputs.exit_code == '1' }}
        run: |
          echo "::warning::One or more locales are below the 80% coverage threshold."
          echo "Run 'node scripts/check-i18n.js' locally to see missing keys."
          # Uncomment the line below to fail the CI build on low coverage:
          # exit 1
